name: Setup Go

on:
  push:
    branches: [ "main" ]
    paths:
      - 'dist/mev/ansible/playbook.yml'
      - 'dist/mev/ansible/ansible.cfg'
      - 'dist/mev/ansible/roles/go/**'
      - '.github/workflows/setup-go.yml'
      - '.github/actions/setup-base/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'dist/mev/ansible/playbook.yml'
      - 'dist/mev/ansible/ansible.cfg'
      - 'dist/mev/ansible/roles/go/**'
      - '.github/workflows/setup-go.yml'
      - '.github/actions/setup-base/**'
  workflow_dispatch:

jobs:
  setup-go:
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup base environment
        uses: ./.github/actions/setup-base

      - name: Setup go
        run: just run make go
