name: Run Tests

on:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: Run Rust tests
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Setup base environment
        uses: ./.github/actions/setup-base

      - name: Run tests
        run: just test
