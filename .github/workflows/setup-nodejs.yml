name: Setup Node.js and LLM Tools

on:
  push:
    branches: [ "main" ]
    paths:
      - 'dist/mev/ansible/playbook.yml'
      - 'dist/mev/ansible/ansible.cfg'
      - 'dist/mev/ansible/roles/nodejs/**'
      - '.github/workflows/setup-nodejs.yml'
      - '.github/actions/setup-base/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'dist/mev/ansible/playbook.yml'
      - 'dist/mev/ansible/ansible.cfg'
      - 'dist/mev/ansible/roles/nodejs/**'
      - '.github/workflows/setup-nodejs.yml'
      - '.github/actions/setup-base/**'
  workflow_dispatch:

jobs:
  setup-nodejs:
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup base environment
        uses: ./.github/actions/setup-base

      - name: Run nodejs-platform setup
        run: just run make nodejs-platform 

      - name: Run nodejs-tools setup
        run: just run make nodejs-tools 

      - name: Setup Node.js LLM Tools
        run: just run make coder 
