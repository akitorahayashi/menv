name: Setup Python

on:
  push:
    branches: [ "main" ]
    paths:
      - 'dist/mev/ansible/playbook.yml'
      - 'dist/mev/ansible/ansible.cfg'
      - 'dist/mev/ansible/roles/python/**'
      - '.github/workflows/setup-python.yml'
      - '.github/actions/setup-base/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'dist/mev/ansible/playbook.yml'
      - 'dist/mev/ansible/ansible.cfg'
      - 'dist/mev/ansible/roles/python/**'
      - '.github/workflows/setup-python.yml'
      - '.github/actions/setup-base/**'
  workflow_dispatch:

jobs:
  setup-python:
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup base environment
        uses: ./.github/actions/setup-base

      - name: Run python-platform setup
        run: just run make python-platform 

      - name: Run uv setup
        run: just run make uv 

      - name: Run python-tools setup
        run: just run make python-tools 
        
      - name: Run aider setup
        run: just run make aider 
