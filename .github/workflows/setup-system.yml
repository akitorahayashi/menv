name: Setup System

on:
  push:
    branches: [ "main" ]
    paths:
      - 'dist/mev/ansible/playbook.yml'
      - 'dist/mev/ansible/ansible.cfg'
      - 'dist/mev/ansible/roles/vcs/**'
      - 'dist/mev/ansible/roles/gh/**'
      - 'dist/mev/ansible/roles/shell/**'
      - 'dist/mev/ansible/roles/ssh/**'
      - 'dist/mev/ansible/roles/system/**'
      - '.github/workflows/setup-system.yml'
      - '.github/actions/setup-base/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'dist/mev/ansible/playbook.yml'
      - 'dist/mev/ansible/ansible.cfg'
      - 'dist/mev/ansible/roles/vcs/**'
      - 'dist/mev/ansible/roles/gh/**'
      - 'dist/mev/ansible/roles/shell/**'
      - 'dist/mev/ansible/roles/ssh/**'
      - 'dist/mev/ansible/roles/system/**'
      - '.github/workflows/setup-system.yml'
      - '.github/actions/setup-base/**'
  workflow_dispatch:

jobs:
  setup-system:
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup base environment
        uses: ./.github/actions/setup-base

      - name: Setup Git configuration
        run: just run make git 

      - name: Setup GitHub CLI configuration
        run: just run make gh 

      - name: Setup JJ configuration
        run: just run make jj 

      - name: Setup shell configuration
        run: just run make shell 
        
      - name: Test shell aliases functionality
        shell: zsh {0}
        run: |
          set -euo pipefail
          source ~/.zshrc
          mk --version

      - name: Setup SSH configuration
        run: just run make ssh 

      - name: Apply macOS system defaults
        run: just run make system 
