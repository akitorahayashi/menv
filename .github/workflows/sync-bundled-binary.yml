name: Sync Bundled Binary

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'dist/mev/bin/darwin-aarch64/mev'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-bundled-binary-main
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    uses: ./.github/workflows/run-linters.yml

  test:
    name: Test
    uses: ./.github/workflows/run-tests.yml

  coverage:
    name: Coverage
    uses: ./.github/workflows/collect-coverage.yml

  build:
    name: Build
    uses: ./.github/workflows/build-bundled-binary.yml

  sync-darwin-aarch64:
    needs: [lint, test, build]
    if: github.actor != 'github-actions[bot]' && github.ref == 'refs/heads/main'
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        uses: ./.github/actions/configure-git

      - name: Download bundled binary artifact
        uses: actions/download-artifact@v4
        with:
          name: mev-darwin-aarch64
          path: .tmp/artifacts

      - name: Replace bundled binary
        run: |
          set -euo pipefail
          install -m 0755 .tmp/artifacts/mev-darwin-aarch64 dist/mev/bin/darwin-aarch64/mev

      - name: Commit bundled binary
        run: |
          set -euo pipefail
          if git diff --quiet -- dist/mev/bin/darwin-aarch64/mev; then
            echo "Bundled binary already up to date."
            exit 0
          fi

          git add dist/mev/bin/darwin-aarch64/mev
          git commit -m "chore: sync bundled mev binary (darwin-aarch64) [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main
