name: Sync Bundled Binary

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-bundled-binary-main
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    uses: ./.github/workflows/run-linters.yml

  test:
    name: Test
    uses: ./.github/workflows/run-tests.yml

  coverage:
    name: Coverage
    uses: ./.github/workflows/collect-coverage.yml

  build:
    name: Build
    uses: ./.github/workflows/build-bundled-binary.yml

  publish-darwin-aarch64:
    needs: [lint, test, build]
    if: github.actor != 'github-actions[bot]' && github.ref == 'refs/heads/main'
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download bundled binary artifact
        uses: actions/download-artifact@v4
        with:
          name: mev-darwin-aarch64
          path: .tmp/artifacts

      - name: Publish release artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release view latest || gh release create latest --title "Latest Build" --notes "Continuous build from main"
          gh release upload latest .tmp/artifacts/mev-darwin-aarch64#mev-darwin-aarch64 --clobber
