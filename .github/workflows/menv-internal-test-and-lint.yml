name: menv-internal Test and Lint

on:
  push:
    branches: ["main"]
    paths:
      - "crates/menv-internal/**"
  pull_request:
    branches: ["main"]
    paths:
      - "crates/menv-internal/**"
  workflow_dispatch:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    env:
      RUST_BACKTRACE: 1
    defaults:
      run:
        working-directory: crates/menv-internal

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/menv-internal -> crates/menv-internal/target

      - name: Run tests
        run: cargo test --all-targets --all-features

      - name: Run format check
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
