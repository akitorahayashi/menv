name: MacOS Environment Setup CI Pipeline

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - '.mock-*'
      - 'dist/mev/bin/darwin-aarch64/mev'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - '.mock-*'
      - 'dist/mev/bin/darwin-aarch64/mev'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    uses: ./.github/workflows/run-linters.yml

  test:
    name: Test
    uses: ./.github/workflows/run-tests.yml

  coverage:
    name: Coverage
    uses: ./.github/workflows/collect-coverage.yml

  build:
    name: Build
    uses: ./.github/workflows/build-bundled-binary.yml

  setup-python:
    uses: ./.github/workflows/setup-python.yml

  setup-nodejs:
    uses: ./.github/workflows/setup-nodejs.yml

  setup-runtime:
    uses: ./.github/workflows/setup-runtime.yml

  setup-ide:
    uses: ./.github/workflows/setup-ide.yml

  setup-system:
    uses: ./.github/workflows/setup-system.yml
